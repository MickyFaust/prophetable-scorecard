<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prophetable 2026 | Syndicate Scorecard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0b10; --card-bg: rgba(255, 255, 255, 0.03); --accent: #00d2ff; --accent-purple: #9d50bb; --text: #ffffff; --success: #00ff88; --danger: #ff4444; }
        body { background: radial-gradient(circle at top right, #1a1b25, var(--bg)); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 30px 0; }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        
        /* Stats Styling */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.08); padding: 20px; border-radius: 15px; text-align: center; }
        .stat-val { font-size: 1.8rem; font-weight: 900; display: block; }
        .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.5; }

        /* Grouping Layout */
        .date-section { margin-bottom: 50px; }
        .date-header { font-size: 1.4rem; font-weight: 900; color: var(--accent); border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; }
        .tier-group { margin-bottom: 25px; }
        .tier-label { font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; opacity: 0.8; display: flex; align-items: center; }
        .tier-label.max { color: var(--accent-purple); }
        .tier-label.elite { color: var(--accent); }

        /* Play Card */
        .play-card { background: var(--card-bg); margin-bottom: 10px; padding: 15px 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); }
        .play-info h3 { margin: 0; font-size: 1rem; }
        .play-info p { margin: 3px 0 0; opacity: 0.5; font-size: 0.75rem; }
        .units { font-weight: 900; font-size: 1.1rem; }
        .pos { color: var(--success); }
        .neg { color: var(--danger); }
        .admin-btn { background: rgba(255,255,255,0.05); color: white; text-decoration: none; padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">PROPHETABLE<span>2026</span></div>
            <a href="/admin.html" class="admin-btn">SYNDICATE LOGIN</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><span class="stat-val" id="total-units">0.00u</span><span class="stat-label">Total Profit</span></div>
            <div class="stat-card"><span class="stat-val" id="win-rate">0%</span><span class="stat-label">Win Rate</span></div>
            <div class="stat-card"><span class="stat-val" id="total-plays">0</span><span class="stat-label">Total Plays</span></div>
        </div>

        <div id="plays-container"></div>
    </div>

    <script>
        async function loadPlays() {
            const res = await fetch('/api/plays');
            const plays = await res.json();
            const container = document.getElementById('plays-container');
            
            if (!plays || plays.length === 0) return;

            // Sort & Group by Date
            const grouped = {};
            let totalUnits = 0; let wins = 0;

            plays.forEach(p => {
                totalUnits += parseFloat(p.units);
                if (parseFloat(p.units) > 0) wins++;
                if (!grouped[p.date]) grouped[p.date] = { MAX: [], ELITE: [] };
                const tierKey = p.tier.includes('MAX') ? 'MAX' : 'ELITE';
                grouped[p.date][tierKey].push(p);
            });

            const sortedDates = Object.keys(grouped).sort((a, b) => new Date(b) - new Date(a));

            container.innerHTML = sortedDates.map(date => `
                <div class="date-section">
                    <div class="date-header">${date}</div>
                    
                    ${grouped[date].MAX.length > 0 ? `
                        <div class="tier-group">
                            <div class="tier-label max">● MAX PROPHET</div>
                            ${grouped[date].MAX.map(renderCard).join('')}
                        </div>
                    ` : ''}

                    ${grouped[date].ELITE.length > 0 ? `
                        <div class="tier-group">
                            <div class="tier-label elite">● PROPHET ELITE</div>
                            ${grouped[date].ELITE.map(renderCard).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');

            document.getElementById('total-units').innerText = (totalUnits >= 0 ? '+' : '') + totalUnits.toFixed(2) + 'u';
            document.getElementById('total-plays').innerText = plays.length;
            document.getElementById('win-rate').innerText = ((wins / plays.length) * 100).toFixed(1) + '%';
        }

        function renderCard(play) {
            const unitClass = play.units >= 0 ? 'pos' : 'neg';
            return `
                <div class="play-card">
                    <div class="play-info">
                        <h3>${play.matchup} — ${play.pick} (${play.odds})</h3>
                        <p>${play.league}</p>
                    </div>
                    <div class="units ${unitClass}">${play.units > 0 ? '+' : ''}${play.units}u</div>
                </div>
            `;
        }
        loadPlays();
    </script>
</body>
</html>
