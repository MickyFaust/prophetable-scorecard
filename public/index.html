<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prophetable 2026 | Syndicate Scorecard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0b10; --card-bg: rgba(255, 255, 255, 0.03); --accent: #00d2ff; --accent-purple: #9d50bb; --text: #ffffff; --success: #00ff88; --danger: #ff4444; }
        body { background: radial-gradient(circle at top right, #1a1b25, var(--bg)); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 40px 0; }
        .logo { font-weight: 900; font-size: 1.8rem; letter-spacing: -1px; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 20px; backdrop-filter: blur(10px); text-align: center; }
        .stat-val { font-size: 2.2rem; font-weight: 900; display: block; margin-bottom: 5px; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.6; }
        .play-card { background: var(--card-bg); margin-bottom: 15px; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); border-right: 1px solid rgba(255,255,255,0.05); }
        .play-card.max { border-left-color: var(--accent-purple); box-shadow: inset 5px 0 15px rgba(157, 80, 187, 0.1); }
        .play-info h3 { margin: 0; font-size: 1.1rem; letter-spacing: 0.5px; }
        .play-info p { margin: 5px 0 0; opacity: 0.5; font-size: 0.8rem; text-transform: uppercase; font-weight: 700; }
        .units { font-weight: 900; font-size: 1.3rem; }
        .pos { color: var(--success); text-shadow: 0 0 10px rgba(0,255,136,0.2); }
        .neg { color: var(--danger); }
        .admin-btn { background: rgba(255,255,255,0.05); color: white; text-decoration: none; padding: 10px 20px; border-radius: 30px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .admin-btn:hover { background: var(--accent); color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">PROPHETABLE<span>2026</span></div>
            <a href="/admin.html" class="admin-btn">SYNDICATE LOGIN</a>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-val" id="total-units">0.00u</span>
                <span class="stat-label">Total Profit</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="win-rate">0%</span>
                <span class="stat-label">Win Rate</span>
            </div>
            <div class="stat-card">
                <span class="stat-val" id="total-plays">0</span>
                <span class="stat-label">Total Plays</span>
            </div>
        </div>

        <h2 style="margin-bottom: 25px; font-weight: 900; letter-spacing: -0.5px;">RECENT ACTION</h2>
        <div id="plays-container"></div>
    </div>

    <script>
        async function loadPlays() {
            try {
                const res = await fetch('/api/plays');
                const plays = await res.json();
                const container = document.getElementById('plays-container');
                
                let totalUnits = 0;
                let wins = 0;

                if (!plays || plays.length === 0) {
                    container.innerHTML = '<p style="opacity:0.3; text-align:center; padding: 40px;">Awaiting 2026 Syndicate data...</p>';
                    return;
                }

                container.innerHTML = plays.slice().reverse().map(play => {
                    totalUnits += parseFloat(play.units);
                    if (parseFloat(play.units) > 0) wins++;
                    
                    const unitClass = play.units >= 0 ? 'pos' : 'neg';
                    const tierClass = play.tier === 'MAX PROPHET' ? 'max' : '';
                    const displayOdds = play.odds ? `(${play.odds})` : '';

                    return `
                        <div class="play-card ${tierClass}">
                            <div class="play-info">
                                <h3>${play.matchup} — ${play.pick} ${displayOdds}</h3>
                                <p>${play.date} | ${play.league} | ${play.tier || 'PROPHET ELITE'}</p>
                            </div>
                            <div class="units ${unitClass}">${play.units > 0 ? '+' : ''}${play.units}u</div>
                        </div>
                    `;
                }).join('');

                document.getElementById('total-units').innerText = (totalUnits >= 0 ? '+' : '') + totalUnits.toFixed(2) + 'u';
                document.getElementById('total-units').className = 'stat-val ' + (totalUnits >= 0 ? 'pos' : 'neg');
                document.getElementById('total-plays').innerText = plays.length;
                document.getElementById('win-rate').innerText = ((wins / plays.length) * 100).toFixed(1) + '%';
            } catch (err) {
                document.getElementById('plays-container').innerHTML = '<p style="color:red">Error connecting to Syndicate Engine.</p>';
            }
        }
        loadPlays();
    </script>
</body>
</html>
